<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Rslidy Presentation</title>
    <link rel="stylesheet" href="rslidy.css" />
    <script type="module" src="rslidy.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <section>
        <h1>Dishonest chart techniques example using Rslidy</h1>
        <p>Press the right arrow key to go to the next slide.</p>
    </section>

    <section>
        <h1>Rslidy example: Cherry Picking</h1>
        
        <div style="position: relative; width: 80vw; height: 50vh; margin: 0 auto;">
            <canvas id="climateChart"></canvas>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="showFullTrend()" style="padding: 10px; font-size: 16px; cursor: pointer;">Show Full Trend (Reality)</button>
            <button onclick="showCherryPicked()" style="padding: 10px; font-size: 16px; cursor: pointer; background-color: #ffcccc;">Cherry Pick (Misleading)</button>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Setup the data
            const years = Array.from({length: 50}, (_, i) => 1970 + i);
            const fullTemperatures = years.map(year => (year - 1970) * 0.02 + (Math.random() * 0.4 - 0.2));
            
            const cherryPickedTemperatures = fullTemperatures.map((temp, index) => {
                const year = years[index];
                if (year >= 1998 && year <= 2008) return temp; 
                return null;
            });

            const canvas = document.getElementById('climateChart');
            let chartInitialized = false;

            // 2. Wrap the chart creation in a function so we can delay it
            function createChart() {
                if (chartInitialized) return; // Prevent drawing it twice
                
                const ctx = canvas.getContext('2d');
                window.myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: years,
                        datasets: [{
                            label: 'Temperature Anomaly',
                            data: fullTemperatures,
                            borderColor: 'red',
                            backgroundColor: 'rgba(255, 0, 0, 0.1)',
                            borderWidth: 2,
                            tension: 0.3,
                            spanGaps: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: {
                            duration: 1500 // Add a nice load animation when they arrive at the slide
                        },
                        scales: {
                            y: { min: -0.5, max: 1.5, title: { display: true, text: 'Temperature Change (°C)' } },
                            x: { title: { display: true, text: 'Year' } }
                        }
                    }
                });
                
                chartInitialized = true;
            }

            // 3. The Magic Fix: The Intersection Observer
            // This watches the canvas. If it becomes visible on the screen, it runs createChart()
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    createChart();
                    observer.disconnect(); // Stop watching once the chart is built
                }
            });

            // Start watching the canvas
            observer.observe(canvas);

            // 4. Button functions
            window.showFullTrend = function() {
                if(!window.myChart) return;
                window.myChart.data.datasets[0].data = fullTemperatures;
                window.myChart.data.datasets[0].borderColor = 'red';
                window.myChart.update();
            };

            window.showCherryPicked = function() {
                if(!window.myChart) return;
                window.myChart.data.datasets[0].data = cherryPickedTemperatures;
                window.myChart.data.datasets[0].borderColor = 'blue';
                window.myChart.update();
            };
        });
    </script>

</body>
</html>
